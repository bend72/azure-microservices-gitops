---
# argocd/apps/catalog.yaml
# ─────────────────────────────────────────────────────────────────────────────
# Each microservice Application uses its own Helm chart under helm/services/<svc>
# and its own namespace. Image tag is updated by CI via `argocd app set` or
# the image-updater annotation below.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: catalog
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    # ArgoCD Image Updater — watches ACR, auto-PRs or commits new tags
    argocd-image-updater.argoproj.io/image-list: "catalog=acrstage2demo.azurecr.io/catalog"
    argocd-image-updater.argoproj.io/catalog.update-strategy: semver
    argocd-image-updater.argoproj.io/catalog.allow-tags: "regexp:^[0-9]+\\.[0-9]+\\.[0-9]+$"
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: microservices
  source:
    repoURL: https://github.com/bend72/azure-microservices-gitops
    targetRevision: main
    path: helm/services/catalog
    helm:
      valueFiles:
        - values.yaml
        - values-demo.yaml
      parameters:
        - name: global.env
          value: demo
        - name: otel.endpoint
          value: http://otel-collector-collector.opentelemetry.svc.cluster.local:4317
  destination:
    server: https://kubernetes.default.svc
    namespace: catalog
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas   # KEDA owns replica count

