# ── helm/services/notification/values-demo.yaml ──────────────────────────────
# Demo-environment overrides — applied on top of values.yaml by ArgoCD.
# notification is stateless — delivers webhook events, no DB.
# ─────────────────────────────────────────────────────────────────────────────

global:
  env: demo

replicaCount: 1

# notification already has low defaults (50m/64Mi); keep them
podDisruptionBudget:
  enabled: false

azure:
  keyVaultName: kv-stage2-demo   # matches Pulumi stage2 output for env=demo
  tenantId: ""                    # SET THIS before deploying Stage 4
                                  # az account show --query tenantId -o tsv
