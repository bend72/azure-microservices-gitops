# ── helm/services/ordering/templates/secretproviderclass.yaml ────────────────
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "ordering.fullname" . }}-kv
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ordering.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity:        "false"
    useVMManagedIdentity:  "false"
    clientID:              {{ .Values.global.workloadIdentityClientId | quote }}
    keyvaultName:          kv-stage2-demo
    cloudName:             AzurePublicCloud
    tenantId:              TENANT_ID
    objects: |
      array:
        - |
          objectName: sql-ordering-connection-string
          objectType: secret
        - |
          objectName: servicebus-connection-string
          objectType: secret
  secretObjects:
    - secretName: {{ include "ordering.fullname" . }}-secrets
      type: Opaque
      data:
        - objectName: sql-ordering-connection-string
          key: sql-ordering-connection-string
        - objectName: servicebus-connection-string
          key: servicebus-connection-string

---
