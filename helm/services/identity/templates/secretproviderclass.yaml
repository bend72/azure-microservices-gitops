# ── helm/services/identity/templates/secretproviderclass.yaml ────────────────
# Identity is stateless — only the shared Service Bus connection string is needed.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "identity.fullname" . }}-kv
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "identity.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity:        "false"
    useVMManagedIdentity:  "false"
    clientID:              {{ .Values.global.workloadIdentityClientId | quote }}
    keyvaultName:          {{ required "azure.keyVaultName must be set in values" .Values.azure.keyVaultName | quote }}
    cloudName:             AzurePublicCloud
    tenantId:              {{ required "azure.tenantId must be set — run: az account show --query tenantId -o tsv" .Values.azure.tenantId | quote }}
    objects: |
      array:
        - |
          objectName: servicebus-connection-string
          objectType: secret
  secretObjects:
    - secretName: {{ include "identity.fullname" . }}-secrets
      type: Opaque
      data:
        - objectName: servicebus-connection-string
          key: servicebus-connection-string

---
