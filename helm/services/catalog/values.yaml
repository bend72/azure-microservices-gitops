---
# ── helm/services/catalog/values.yaml ────────────────────────────────────────
global:
  env: local
  acrLoginServer: acrstage2demo.azurecr.io
  workloadIdentityClientId: ""   # patched by Backstage template

image:
  repository: acrstage2demo.azurecr.io/catalog
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1   # KEDA owns this at runtime — value only used on first deploy

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  # Informational only — actual ScaledObject lives in stage3.ts (Pulumi-managed)
  minReplicas: 1
  maxReplicas: 20

dapr:
  enabled: true
  appId: catalog
  appPort: 8080
  logLevel: info
  # Auto-instrument via OTel operator annotation on the pod
  enableApiLogging: false

otel:
  endpoint: http://otel-collector-collector.opentelemetry.svc.cluster.local:4317

cosmos:
  # Injected at runtime from KV via CSI driver
  databaseName: catalog
  containerName: products

serviceAccount:
  create: true
  # Workload Identity binding — Azure AD app registration client ID
  annotations: {}

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
  path: /catalog(/|$)(.*)
  pathType: ImplementationSpecific

livenessProbe:
  httpGet:
    path: /healthz/live
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /healthz/ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

podDisruptionBudget:
  enabled: true
  minAvailable: 1

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: catalog

---