# ── helm/services/catalog/templates/secretproviderclass.yaml ─────────────────
# Pulls secrets from Azure Key Vault using the CSI Secrets Store driver.
# The pod's workload identity (federated credential) grants read access to KV.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "catalog.fullname" . }}-kv
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "catalog.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity:        "false"
    useVMManagedIdentity:  "false"
    clientID:              {{ .Values.global.workloadIdentityClientId | quote }}
    keyvaultName:          kv-stage2-demo   # parameterise further if multi-env
    cloudName:             AzurePublicCloud
    tenantId:              TENANT_ID        # patched by Backstage template
    objects: |
      array:
        - |
          objectName: cosmos-catalog-connection-string
          objectType: secret
        - |
          objectName: servicebus-connection-string
          objectType: secret
  # Sync KV secrets into a Kubernetes Secret so env vars can reference them
  secretObjects:
    - secretName: {{ include "catalog.fullname" . }}-secrets
      type: Opaque
      data:
        - objectName: cosmos-catalog-connection-string
          key: cosmos-catalog-connection-string
        - objectName: servicebus-connection-string
          key: servicebus-connection-string

---