{{- if .Values.otel.createInstrumentation }}
# Creates the OTel Instrumentation CR in this service's namespace so the
# operator webhook can inject the .NET SDK init container into pods that carry
# the annotation: instrumentation.opentelemetry.io/inject-dotnet: "true"
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: auto-instrumentation
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "catalog.labels" . | nindent 4 }}
spec:
  exporter:
    endpoint: {{ .Values.otel.endpoint | quote }}
  propagators:
    - tracecontext
    - baggage
    - b3
  sampler:
    type: parentbased_traceidratio
    argument: "1.0"
  dotnet:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-dotnet:1.3.0
{{- end }}
