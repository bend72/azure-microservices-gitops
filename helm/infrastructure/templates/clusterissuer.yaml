# ── helm/infrastructure/templates/clusterissuer.yaml ─────────────────────────
# Let's Encrypt (or internal CA) via DNS-01 challenge against Azure DNS.
# cert-manager uses its workload identity to modify DNS TXT records.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: platform@contoso.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          azureDNS:
            tenantID:       {{ .Values.global.azureTenantId }}
            subscriptionID: {{ .Values.global.azureSubscriptionId }}
            resourceGroupName: {{ .Values.global.azureDnsResourceGroup }}
            hostedZoneName:    {{ .Values.global.dnsZone }}
            managedIdentity:
              clientID: CERT_MANAGER_CLIENT_ID

---
# Internal self-signed issuer for cluster-internal TLS (e.g. APIM → AKS mTLS)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: internal-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: contoso-internal-ca
  secretName: internal-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer

---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-ca-issuer
spec:
  ca:
    secretName: internal-ca-secret

---