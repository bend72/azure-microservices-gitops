global:
  env: ${{ values.targetEnv }}
  acrLoginServer: ${{ values.acrLoginServer }}
  workloadIdentityClientId: ""   # patched by Backstage after Workload Identity creation

image:
  repository: ${{ values.acrLoginServer }}/${{ values.serviceName }}
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  minReplicas: ${{ values.minReplicas }}
  maxReplicas: ${{ values.maxReplicas }}

dapr:
  enabled: true
  appId: ${{ values.serviceName }}
  appPort: 8080
  logLevel: info
  enableApiLogging: false

otel:
  endpoint: http://otel-collector-collector.opentelemetry.svc.cluster.local:4317

{% if values.databaseType == "cosmos" %}
cosmos:
  databaseName: ${{ values.serviceName }}
  containerName: items
{% elif values.databaseType == "sql" %}
sql:
  databaseName: ${{ values.serviceName }}
{% endif %}

serviceAccount:
  create: true
  annotations: {}

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
  path: /${{ values.serviceName }}(/|$)(.*)
  pathType: ImplementationSpecific

livenessProbe:
  httpGet:
    path: /healthz/live
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /healthz/ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

podDisruptionBudget:
  enabled: ${{ values.enablePdb }}
  minAvailable: 1

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: ${{ values.serviceName }}
